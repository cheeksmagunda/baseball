name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + dev extras
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Live-isolation audit (no historical outcomes in T-65 path)
        run: python scripts/audit_live_isolation.py

      - name: Pytest
        env:
          BO_CURRENT_SEASON: "2026"
        run: pytest -q
